name: systemd integration test

on:
  push:
    branches:
    - main

permissions:
  contents: read

jobs:
  systemd:
    name: Systemd integration test
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    - name: Build test image
      uses: docker/build-push-action@v6
      with:
        context: .
        file: tests/systemd/Dockerfile
        tags: mtrack-systemd-test:latest
        load: true
        cache-from: type=gha
        cache-to: type=gha,mode=max
    - name: Run systemd integration test
      run: |
        cid=$(docker run -d --rm --privileged mtrack-systemd-test:latest)
        cleanup() { docker stop "$cid" >/dev/null 2>&1 || true; }
        trap cleanup EXIT
        echo "Waiting for systemd to boot..."
        for i in $(seq 1 30); do
          docker exec "$cid" systemctl is-system-running 2>/dev/null | grep -qE 'running|degraded' && break
          sleep 1
        done
        docker exec "$cid" /test.sh
