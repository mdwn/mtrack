name: publish
on:
  push:
    tags:
    - 'v*.*.*'

permissions:
  contents: write

jobs:
  # Publishes mtrack to crates.io.
  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: jetify-com/devbox-install-action@v0.14.0
    - name: Cache node modules
      uses: actions/cache@v5
      with:
        path: src/webui/svelte/node_modules
        key: node-modules-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}
        restore-keys: node-modules-${{ runner.os }}-
    - name: Build frontend
      run: devbox run -- bash -c 'cd src/webui/svelte && npm ci && buf generate && npm run build'
    - name: Run publish
      env:
        CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      run: devbox run -- cargo publish --allow-dirty

  # Creates a release on Github.
  release:
    name: Create a GitHub release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Extract release notes
        id: extract-release-notes
        uses: ffurrer2/extract-release-notes@v3
      - name: Create release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_NOTES: ${{ steps.extract-release-notes.outputs.release_notes }}
        run: gh release create --notes "$RELEASE_NOTES" --title "${{ github.ref_name }}" "${{ github.ref_name }}"
