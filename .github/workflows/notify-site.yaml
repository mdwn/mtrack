name: Notify site of new release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch to site repo
        run: |
          curl -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.SITE_DISPATCH_TOKEN }}" \
            https://api.github.com/repos/nonchord/site/dispatches \
            -d '{"event_type":"mtrack-release","client_payload":{"tag":"${{ github.ref_name }}"}}'
