name: mtrack
on:
  push:
    branches:
    - main
  pull_request:
    branches:
    - main

permissions:
  contents: read

jobs:
  # Build the code and verify that Cargo.lock is up to date.
  build:
    name: Build mtrack
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: jetify-com/devbox-install-action@v0.12.0
      with:
        enable-cache: 'true'
    - uses: Swatinem/rust-cache@v2
      with:
        shared-key: "cargo"
    - uses: actions/cache@v4
      with:
        path: src/webui/svelte/node_modules
        key: node-modules-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}
        restore-keys: node-modules-${{ runner.os }}-
    - name: Build frontend
      run: devbox run -- bash -c 'cd src/webui/svelte && npm ci && buf generate && npm run build'
    - name: Build mtrack
      run: devbox run -- cargo build --all-targets --all-features
    - name: Check if Cargo.lock is up to date
      run: |
        if git diff --exit-code Cargo.lock; then
          echo "Cargo.lock is up to date."
        else
          echo "Cargo.lock needs to be updated."
          exit 1
        fi

  # Clippy effectively lints the code.
  clippy:
    name: Lint mtrack
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: jetify-com/devbox-install-action@v0.12.0
      with:
        enable-cache: 'true'
    - uses: Swatinem/rust-cache@v2
      with:
        shared-key: "cargo"
    - uses: actions/cache@v4
      with:
        path: src/webui/svelte/node_modules
        key: node-modules-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}
        restore-keys: node-modules-${{ runner.os }}-
    - name: Build frontend
      run: devbox run -- bash -c 'cd src/webui/svelte && npm ci && buf generate && npm run build'
    - name: Run clippy
      run: devbox run -- cargo clippy --all --all-targets --all-features

  # Make sure the code is properly formatted.
  rustfmt-check:
    name: Run rustfmt
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: jetify-com/devbox-install-action@v0.12.0
      with:
        enable-cache: 'true'
    - name: Run rustfmt
      run: devbox run -- cargo fmt --all -- --check

  # Make sure the tests pass.
  test:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: jetify-com/devbox-install-action@v0.12.0
      with:
        enable-cache: 'true'
    - uses: Swatinem/rust-cache@v2
      with:
        shared-key: "cargo-tarpaulin"
    - uses: actions/cache@v4
      with:
        path: src/webui/svelte/node_modules
        key: node-modules-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}
        restore-keys: node-modules-${{ runner.os }}-
    - name: Build frontend
      run: devbox run -- bash -c 'cd src/webui/svelte && npm ci && buf generate && npm run build'
    - name: Test mtrack
      run: devbox run -- cargo tarpaulin --skip-clean --all-features --timeout 120 --out xml
    - name: Upload coverage reports to Codecov
      uses: codecov/codecov-action@v4.0.1
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        slug: mdwn/mtrack

  # Lint, format-check, and type-check the Svelte frontend.
  frontend:
    name: Frontend checks
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: jetify-com/devbox-install-action@v0.12.0
      with:
        enable-cache: 'true'
    - uses: actions/cache@v4
      with:
        path: src/webui/svelte/node_modules
        key: node-modules-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}
        restore-keys: node-modules-${{ runner.os }}-
    - name: Install and generate
      run: devbox run -- bash -c 'cd src/webui/svelte && npm ci && buf generate'
    - name: Lint
      run: devbox run -- bash -c 'cd src/webui/svelte && npm run lint'
    - name: Format check
      run: devbox run -- bash -c 'cd src/webui/svelte && npm run format:check'
    - name: Type check
      run: devbox run -- bash -c 'cd src/webui/svelte && npm run check'

  # Make sure all code has an appropriate license header.
  licensure:
    name: Ensure license headers
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: jetify-com/devbox-install-action@v0.12.0
      with:
        enable-cache: 'true'
    - name: Check for licenses
      run: devbox run -- licensure --check -p

  # Verify changelog is in keep-a-changelog format.
  verify-changelog:
    name: Verify changelog format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      # We'll run the extract release notes action and drop the results on the floor.
      # If extract-release-notes can successfully extract release notes, we'll
      # consider this success for now.
      - name: Extract release notes
        id: extract-release-notes
        uses: ffurrer2/extract-release-notes@v2
