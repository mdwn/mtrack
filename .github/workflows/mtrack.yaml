name: mtrack
on:
  push:
    branches:
    - main
  pull_request:
    branches:
    - main

permissions:
  contents: read

jobs:
  # Build the code and verify that Cargo.lock is up to date.
  build:
    name: Build mtrack
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - name: Install system dependencies
      run: sudo apt-get update && sudo apt-get install -y libasound2-dev libudev-dev pkg-config libssl-dev protobuf-compiler
    - uses: dtolnay/rust-toolchain@stable
    - uses: Swatinem/rust-cache@v2
      with:
        shared-key: "cargo"
    - uses: actions/setup-node@v4
      with:
        node-version: '22'
    - uses: actions/cache@v5
      with:
        path: src/webui/svelte/node_modules
        key: node-modules-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}
        restore-keys: node-modules-${{ runner.os }}-
    - name: Build frontend
      run: make build-ui
    - name: Build mtrack
      run: cargo build --all-targets --all-features
    - name: Check if Cargo.lock is up to date
      run: |
        if git diff --exit-code Cargo.lock; then
          echo "Cargo.lock is up to date."
        else
          echo "Cargo.lock needs to be updated."
          exit 1
        fi

  # Clippy effectively lints the code.
  clippy:
    name: Lint mtrack
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - name: Install system dependencies
      run: sudo apt-get update && sudo apt-get install -y libasound2-dev libudev-dev pkg-config libssl-dev protobuf-compiler
    - uses: dtolnay/rust-toolchain@stable
      with:
        components: clippy
    - uses: Swatinem/rust-cache@v2
      with:
        shared-key: "cargo"
    - uses: actions/setup-node@v4
      with:
        node-version: '22'
    - uses: actions/cache@v5
      with:
        path: src/webui/svelte/node_modules
        key: node-modules-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}
        restore-keys: node-modules-${{ runner.os }}-
    - name: Build frontend
      run: make build-ui
    - name: Run clippy
      run: make lint-rust

  # Make sure the code is properly formatted.
  rustfmt-check:
    name: Run rustfmt
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: dtolnay/rust-toolchain@stable
      with:
        components: rustfmt
    - name: Run rustfmt
      run: make fmt-rust-check

  # Make sure the tests pass.
  test:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - name: Install system dependencies
      run: sudo apt-get update && sudo apt-get install -y libasound2-dev libudev-dev pkg-config libssl-dev protobuf-compiler
    - uses: dtolnay/rust-toolchain@stable
    - uses: Swatinem/rust-cache@v2
      with:
        shared-key: "cargo-tarpaulin"
    - uses: actions/setup-node@v4
      with:
        node-version: '22'
    - uses: actions/cache@v5
      with:
        path: src/webui/svelte/node_modules
        key: node-modules-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}
        restore-keys: node-modules-${{ runner.os }}-
    - name: Build frontend
      run: make build-ui
    - uses: taiki-e/install-action@v2
      with:
        tool: cargo-tarpaulin
    - name: Test mtrack
      run: cargo tarpaulin --skip-clean --all-features --timeout 120 --out xml
    - name: Upload coverage reports to Codecov
      uses: codecov/codecov-action@v5
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        slug: mdwn/mtrack

  # Lint, format-check, and type-check the Svelte frontend.
  frontend:
    name: Frontend checks
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-node@v4
      with:
        node-version: '22'
    - uses: actions/cache@v5
      with:
        path: src/webui/svelte/node_modules
        key: node-modules-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}
        restore-keys: node-modules-${{ runner.os }}-
    - name: Install and generate
      run: make install-ui gen-proto
    - name: Lint
      run: make lint-ui
    - name: Format check
      run: cd src/webui/svelte && npm run format:check

  # Run Playwright E2E tests against mock backend.
  playwright:
    name: Playwright E2E tests
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-node@v4
      with:
        node-version: '22'
    - uses: actions/cache@v5
      with:
        path: src/webui/svelte/node_modules
        key: node-modules-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}
        restore-keys: node-modules-${{ runner.os }}-
    - name: Install and generate
      run: make install-ui gen-proto
    - name: Install Playwright browsers
      run: cd src/webui/svelte && npx playwright install chromium
    - name: Install Playwright system deps
      run: cd src/webui/svelte && npx playwright install-deps chromium
    - name: Run Playwright tests
      run: make test-ui
    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: src/webui/svelte/playwright-report/
        retention-days: 14

  # Make sure all code has an appropriate license header.
  licensure:
    name: Ensure license headers
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: dtolnay/rust-toolchain@stable
    - uses: taiki-e/install-action@v2
      with:
        tool: licensure
    - name: Check for licenses
      run: licensure --check -p

  # Verify changelog is in keep-a-changelog format.
  verify-changelog:
    name: Verify changelog format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      # We'll run the extract release notes action and drop the results on the floor.
      # If extract-release-notes can successfully extract release notes, we'll
      # consider this success for now.
      - name: Extract release notes
        id: extract-release-notes
        uses: ffurrer2/extract-release-notes@v3
